# =============================================================================
# Release & Deploy — workflow ÚNICO (release → build → bump, encadeados por needs)
#
#   push em main → semantic-release cria vX.Y.Z → build/push da imagem →
#   bump da tag no repo gitops-manifests → ArgoCD sincroniza.
#
# Por que um workflow só? O build vira um *job* downstream (needs: release), não
# um workflow disparado pela tag. Assim o GITHUB_TOKEN padrão basta — não precisa
# de PAT (SEMANTIC_RELEASE_TOKEN) só para "uma action disparar a outra" (o GitHub
# bloqueia o token padrão de disparar workflows recursivos via push de tag).
#
# Bump por tipo de commit convencional (regras em .releaserc.json):
#   feat → minor · fix/perf/refactor → patch · feat!/BREAKING CHANGE → major
#   chore/docs/test/ci/build → sem release
# =============================================================================

name: Release & Deploy

on:
  push:
    branches: [main]

# semantic-release cria a tag + GitHub Release usando o GITHUB_TOKEN padrão.
permissions:
  contents: write

jobs:
  release:
    name: Release (semantic-release)
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          # .releaserc.json usa o preset conventionalcommits → instalar o pacote
          extra_plugins: |
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.published == 'true'
    env:
      IMAGE: ${{ secrets.REGISTRY_USER }}/${{ github.event.repository.name }}
      VERSION: ${{ needs.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          # Docker Hub é o registry default — não setar `registry:`.
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: APP_VERSION=${{ env.VERSION }}
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Bump da tag de imagem no repo gitops-manifests → ArgoCD sincroniza.
  # Habilite com vars.GITOPS_BUMP_ENABLED='true' (variável, não secret).
  # ---------------------------------------------------------------------------
  bump:
    name: Bump GitOps Manifest
    runs-on: ubuntu-latest
    needs: [release, build]
    if: needs.release.outputs.published == 'true' && vars.GITOPS_BUMP_ENABLED == 'true'
    env:
      VERSION: ${{ needs.release.outputs.version }}
      MANIFEST_REPO: ${{ vars.GITOPS_MANIFEST_REPO }}
      MANIFEST_BRANCH: ${{ vars.GITOPS_MANIFEST_BRANCH || 'main' }}
      OVERLAY_PATH: argocd-app
      IMAGE_FULL: ${{ secrets.REGISTRY_USER }}/${{ github.event.repository.name }}
    steps:
      - name: Instalar kustomize
        run: |
          curl -sLo kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/

      - name: Clone do manifest repo
        env:
          GH_TOKEN: ${{ secrets.MANIFEST_REPO_TOKEN }}
        run: |
          git clone --depth 5 --branch "${MANIFEST_BRANCH}" \
            "https://x-access-token:${GH_TOKEN}@github.com/${MANIFEST_REPO}" \
            /tmp/manifests

      - name: Bump da tag de imagem
        working-directory: /tmp/manifests/${{ env.OVERLAY_PATH }}
        run: kustomize edit set image "${IMAGE_FULL}=${IMAGE_FULL}:${VERSION}"

      - name: Validar overlay (kustomize build dry-run)
        # Falha aqui = manifest quebrado: garante que o ArgoCD nunca receba YAML inválido.
        working-directory: /tmp/manifests
        run: |
          kustomize build "${OVERLAY_PATH}" > /tmp/rendered.yaml
          echo "→ Overlay renderiza ($(wc -l < /tmp/rendered.yaml) linhas)"

      - name: Commit + push do bump
        working-directory: /tmp/manifests/${{ env.OVERLAY_PATH }}
        run: |
          git config user.email "ci@argocd-app.local"
          git config user.name "argocd-app CI"
          if git diff --quiet; then
            echo "Tag idêntica; nada a commitar."
            exit 0
          fi
          git commit -am "ci: bump argocd-app para ${VERSION}"
          git push origin "${MANIFEST_BRANCH}"
